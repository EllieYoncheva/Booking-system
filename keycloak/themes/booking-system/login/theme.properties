# Extends Keycloak 26.x default login (PatternFly v5).
# Deploy this folder to: <KEYCLOAK_HOME>/themes/booking-system
# Then set Realm → Themes → Login theme → booking-system (or import realm JSON with loginTheme).
parent=keycloak.v2
import=common/keycloak

# styles.css resolves from parent theme; booking-brand.css is local overrides
styles=css/styles.css css/booking-brand.css
